

services:
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: chat-server
    restart: unless-stopped
    ports:  
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    networks:
      - chat-network

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: chat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge