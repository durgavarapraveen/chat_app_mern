server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # Handles client-side routing
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://chat-server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';  # For WebSocket/Socket.io
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io — WebSocket upgrade MUST be here
    location /socket.io/ {
        proxy_pass http://chat-server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;        # Critical for WS
        proxy_set_header Connection "upgrade";         # Critical for WS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;                     # Keep WS alive (24hr)
        proxy_send_timeout 86400s;
    }

}